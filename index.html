<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đố vui cho bé</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: #ffeef2;

            /* CĂN GIỮA TOÀN MÀN HÌNH */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            text-align: center;
        }

        h1 {
            color: #ff6b81;
        }

        img {
            width: 260px;
            border-radius: 16px;
            margin: 15px 0;
        }

        video {
            width: 60%;
            border-radius: 16px;
            margin-top: 15px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            font-size: 18px;
            border: none;
            border-radius: 12px;
            background: #74b9ff;
            color: white;
            cursor: pointer;
        }

        .btn:hover {
            background: #0984e3;
        }

        .option {
            background: #dfe6e9;
            color: #2d3436;
        }

        .selected {
            background: #55efc4 !important;
        }

        .hidden {
            display: none;
        }

        .big-btn {
            font-size: 22px;
            padding: 20px;
            background: #ff7675;
        }

        .result {
            font-size: 22px;
            margin-top: 15px;
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- Trang 1 -->
        <div id="start-screen">
            <h1>Chào mừng đến với chương trình đố vui cho bé </h1>

            <!-- ẢNH -->
            <img src="anh1.jpg" alt="ảnh dễ thương">

            <button class="btn big-btn" onclick="startQuiz()">Bắt đầu</button>
        </div>

        <!-- Trang câu hỏi -->
        <div id="quiz-screen" class="hidden">
            <h2 id="question"></h2>
            <div id="answers"></div>
            <button class="btn" onclick="submitAnswer()">Xác nhận</button>
        </div>

        <!-- Trang kết quả -->
        <div id="result-screen" class="hidden">
            <h1>Kết quả</h1>

            <div class="result" id="score"></div>
            <div class="result" id="reward"></div>

            <!-- VIDEO -->
            <video id="result-video" controls muted playsinline>
                <source src="video2.mp4" type="video/mp4">
                Trình duyệt không hỗ trợ video
            </video>

            <button class="btn" onclick="restart()">Chơi lại</button>
        </div>

    </div>

    <script>
        const questions = [
            { question: "Câu hỏi 1 (placeholder)", options: ["A", "B", "C", "D"], correct: 0 },
            { question: "Câu hỏi 2 (placeholder)", options: ["A", "B", "C", "D"], correct: 1 },
            { question: "Câu hỏi 3 (placeholder)", options: ["A", "B", "C", "D"], correct: 2 },
            { question: "Câu hỏi 4 (placeholder)", options: ["A", "B", "C", "D"], correct: 3 },
            { question: "Câu hỏi 5 (placeholder)", options: ["A", "B", "C", "D"], correct: 0 }
        ];

        let currentQuestion = 0;
        let selected = null;
        let score = 0;

        function startQuiz() {
            document.getElementById("start-screen").classList.add("hidden");
            document.getElementById("quiz-screen").classList.remove("hidden");
            loadQuestion();
        }

        function loadQuestion() {
            selected = null;

            const q = questions[currentQuestion];
            document.getElementById("question").innerText = q.question;

            const answersDiv = document.getElementById("answers");
            answersDiv.innerHTML = "";

            q.options.forEach((opt, index) => {
                const btn = document.createElement("button");
                btn.className = "btn option";
                btn.innerText = opt;

                btn.onclick = () => {
                    document.querySelectorAll(".option").forEach(b => b.classList.remove("selected"));
                    btn.classList.add("selected");
                    selected = index;
                };

                answersDiv.appendChild(btn);
            });
        }

        function submitAnswer() {
            if (selected === null) {
                alert("Hãy chọn một đáp án!");
                return;
            }

            if (selected === questions[currentQuestion].correct) {
                score++;
            }

            currentQuestion++;

            if (currentQuestion < questions.length) {
                loadQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById("quiz-screen").classList.add("hidden");
            document.getElementById("result-screen").classList.remove("hidden");

            document.getElementById("score").innerText = score + "/" + questions.length;

            let rewardText = "";

            if (score === 3) {
                rewardText = "Phần thưởng mốc 3 (placeholder)";
            } else if (score === 4) {
                rewardText = "Phần thưởng mốc 3-4 (placeholder)";
            } else if (score === 5) {
                rewardText = "Phần thưởng mốc 3-4-5 (placeholder)";
            } else {
                rewardText = "Cố gắng thêm nhé! (placeholder)";
            }

            document.getElementById("reward").innerText = rewardText;

            const video = document.getElementById("result-video");
            video.currentTime = 0;
            video.play();
        }

        function restart() {
            currentQuestion = 0;
            score = 0;

            const video = document.getElementById("result-video");
            video.pause();
            video.currentTime = 0;

            document.getElementById("result-screen").classList.add("hidden");
            document.getElementById("start-screen").classList.remove("hidden");
        }
    </script>

</body>

</html>
