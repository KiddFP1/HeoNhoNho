<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đố vui cho bé</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: #ffeef2;

            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            text-align: center;
        }

        h1 {
            color: #ff6b81;
        }

        img {
            width: 90%;
            max-width: 400px;
            border-radius: 16px;
            margin: 15px auto;
            display: block;
        }

        video {
            width: 60%;
            max-width: 260px;
            border-radius: 16px;
            margin: 15px auto;
            display: block;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            font-size: 18px;
            border: none;
            border-radius: 12px;
            background: #74b9ff;
            color: white;
            cursor: pointer;
        }

        .btn:hover {
            background: #0984e3;
        }

        .option {
            background: #dfe6e9;
            color: #2d3436;
        }

        .selected {
            background: #ffeaa7 !important;
        }

        .hidden {
            display: none;
        }

        .big-btn {
            font-size: 22px;
            padding: 20px;
            background: #ff7675;
        }

        .result {
            font-size: 20px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <!-- NHẠC -->
    <audio id="bg-music" src="mp3.mp3" loop></audio>

    <div class="container">

        <!-- Trang 1 -->
        <div id="start-screen">
            <h1>Chào mừng đến với chương trình đố vui cho bé</h1>

            <img src="anh1.jpg" alt="ảnh dễ thương">

            <button class="btn big-btn" onclick="startQuiz()">Bắt đầu</button>
        </div>

        <!-- Trang câu hỏi -->
        <div id="quiz-screen" class="hidden">
            <h2 id="question"></h2>
            <div id="answers"></div>
            <button class="btn" onclick="submitAnswer()">Xác nhận</button>
        </div>

        <!-- Trang kết quả -->
        <div id="result-screen" class="hidden">
            <h1>Kết quả</h1>

            <div class="result" id="score"></div>
            <div class="result" id="reward"></div>

            <video id="result-video" controls muted playsinline>
                <source src="video2.mp4" type="video/mp4">
            </video>

            <button class="btn" onclick="restart()">Chơi lại</button>
        </div>

    </div>

    <script>
        const questions = [
            { question: "Câu số 1 : Heo nho nho năm nay bao nhiêu tuổi ?", options: ["A : 16 tuổi.", "B : 18 tuổi.", "C: 20 tuổi.", "D: 24 tuổi."], correct: 0 },
            { question: "Câu số 2 : Thức uống ưa thích của heo nho nho là gì ?", options: ["A: Trà sữa.", "B: Bia.", "C: Trà hẻm.", "D: Nước có gas."], correct: 2 },
            { question: "Câu số 3 : Lần đầu tiên Any gặp heo nho nho ở đâu ?", options: ["A : Đại học Cần Thơ.", "B: Cầu Hưng Lợi.", "C: Siêu thị Coop.", "D: Rạp chiếu phim."], correct: 1 },
            { question: "Câu số 4 : Heo nho nho là động vật ăn gì ?", options: ["A: Cơm", "B: Mì cay", "C: Bim bim", "D: Ăn cỏ"], correct: 2 },
            { question: "Câu số 5 : Heo nho nho có yêu nhiều anh không ?", options: ["Có", "Không"], correct: 1 }
        ];

        let currentQuestion = 0;
        let selected = null;
        let score = 0;

        function startQuiz() {
            document.getElementById("start-screen").classList.add("hidden");
            document.getElementById("quiz-screen").classList.remove("hidden");

            document.getElementById("bg-music").play();

            loadQuestion();
        }

        function loadQuestion() {
            selected = null;

            const q = questions[currentQuestion];
            document.getElementById("question").innerText = q.question;

            const answersDiv = document.getElementById("answers");
            answersDiv.innerHTML = "";

            q.options.forEach((opt, index) => {
                const btn = document.createElement("button");
                btn.className = "btn option";
                btn.innerText = opt;

                btn.onclick = () => {
                    document.querySelectorAll(".option").forEach(b => b.classList.remove("selected"));
                    btn.classList.add("selected");
                    selected = index;
                };

                answersDiv.appendChild(btn);
            });
        }

        function submitAnswer() {
            if (selected === null) {
                alert("Hãy chọn một đáp án!");
                return;
            }

            const correctIndex = questions[currentQuestion].correct;
            const buttons = document.querySelectorAll(".option");

            buttons.forEach((btn, index) => {
                if (index === correctIndex) {
                    btn.style.background = "#55efc4";
                }
                if (index === selected && selected !== correctIndex) {
                    btn.style.background = "#ff7675";
                }
            });

            if (selected === correctIndex) {
                score++;
            }

            setTimeout(() => {
                currentQuestion++;

                if (currentQuestion < questions.length) {
                    loadQuestion();
                } else {
                    showResult();
                }
            }, 1000);
        }

        function showResult() {
            document.getElementById("quiz-screen").classList.add("hidden");
            document.getElementById("result-screen").classList.remove("hidden");

            document.getElementById("score").innerText = score + "/" + questions.length;

            let rewards = [];

            if (score >= 3) {
                rewards.push("🎁 Mốc 3: Một cái ôm <3");
            }
            if (score >= 4) {
                rewards.push("🍫 Mốc 4: Kẹo Chocolate !!!");
            }
            if (score >= 5) {
                rewards.push("😆 Mốc 5: Bim Bim ^-^");
            }

            let rewardText = rewards.length > 0
                ? rewards.join("<br>")
                : "😢 Đánh đít 1 cái *_*";

            document.getElementById("reward").innerHTML = rewardText;

            const video = document.getElementById("result-video");
            video.currentTime = 0;
            video.play();
        }

        function restart() {
            currentQuestion = 0;
            score = 0;

            const video = document.getElementById("result-video");
            video.pause();
            video.currentTime = 0;

            document.getElementById("result-screen").classList.add("hidden");
            document.getElementById("start-screen").classList.remove("hidden");
        }
    </script>

</body>

</html>
